name: Marche Monitor

on:
  schedule:
    - cron: '*/5 * * * *' # 5分おきに設定（前述の通り5分が最短推奨）
  workflow_dispatch: # 手動実行用
  repository_dispatch: # ← これを追加
    types: [line_trigger] # 好きな名前でOK

jobs:
  check-stock:
    runs-on: ubuntu-latest
    # 書き込み権限を明示的に付与
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python marche_monitor.py

      # --- ここでJSONファイルをGitHubリポジトリに保存（Push）する ---
      - name: Commit and Push JSON
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add chum_last_inventory.json
          # 変更がある場合のみコミットしてプッシュ（エラー回避のため）
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update inventory JSON" && git push)
